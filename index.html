<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prší pro děti</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="style.css?v=202604271835">
</head>
<body>
    <div id="game-container">
        <!-- Settings Panel -->
        <div id="settings-panel" class="panel">
            <button id="close-settings-btn" class="close-btn hidden">✕</button>
            <img src="assets/zaludy.webp" alt="" class="corner-icon top-left">
            <img src="assets/srdce.webp" alt="" class="corner-icon top-right">
            
            <div class="welcome-header">
                <h1>Prší</h1>
                <p>Zahrajeme si?</p>
            </div>

            <div class="settings-grid">
                <div class="setting-card main-mode">
                    <div class="setting-info">
                        <span class="setting-label">Dětský režim</span>
                        <span class="setting-desc">Jednoduchá pravidla pro radost</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="child-mode-toggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>

                <div id="advanced-settings" class="advanced-grid">
                    <div class="setting-card">
                        <span class="setting-label">Eso staví</span>
                        <label class="switch">
                            <input type="checkbox" id="ace-skips-toggle">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="setting-card">
                        <span class="setting-label">7 bere dvě</span>
                        <label class="switch">
                            <input type="checkbox" id="seven-draws-toggle">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="setting-card">
                        <span class="setting-label">Přebíjení</span>
                        <label class="switch">
                            <input type="checkbox" id="stacking-toggle">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="setting-card">
                        <span class="setting-label">Měnění barvy</span>
                        <label class="switch">
                            <input type="checkbox" id="jack-changes-toggle">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="setting-card">
                        <span class="setting-label">Skrýt karty PC</span>
                        <label class="switch">
                            <input type="checkbox" id="hide-opponent-cards-toggle">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="setting-card">
                        <span class="setting-label">Skrýt nápovědy</span>
                        <label class="switch">
                            <input type="checkbox" id="hide-hints-toggle">
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="visual-settings">
                <div class="setting-card">
                    <span class="setting-label">Temný režim</span>
                    <label class="switch">
                        <input type="checkbox" id="dark-mode-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <div class="settings-actions">
                <button id="start-game-btn" class="big-button">Hrát hru!</button>
                <p id="rule-hint" class="rule-hint hidden">Změna pravidel vyžaduje novou hru</p>
            </div>
        </div>

        <!-- Game Board -->
        <div id="game-board" class="hidden">
            <button id="menu-btn">⚙️</button>
            
            <div id="opponent-area">
                <div id="opponent-hand" class="hand"></div>
            </div>

            <div id="center-area">
                <div id="center-piles">
                    <div id="draw-pile-container">
                        <div id="draw-pile" class="pile">
                            <div class="card-back"></div>
                            <div id="draw-count">0</div>
                        </div>
                    </div>
                    <div id="discard-pile" class="pile"></div>
                </div>
                
                <div id="game-status">
                    <div id="turn-message">Na řadě jsi ty!</div>
                    <div id="current-suit-indicator" class="hidden">
                        Hraje se: <span id="active-suit-icon"></span>
                    </div>
                </div>

                <!-- Suit Picker (Svršek) -->
                <div id="suit-picker" class="hidden">
                    <h3>Vyber barvu:</h3>
                    <div class="color-options">
                        <button class="color-btn hearts" data-suit="hearts"></button>
                        <button class="color-btn leaves" data-suit="leaves"></button>
                        <button class="color-btn bells" data-suit="bells"></button>
                        <button class="color-btn acorns" data-suit="acorns"></button>
                    </div>
                </div>
            </div>

            <div id="player-area">
                <div id="player-hand" class="hand"></div>
            </div>
        </div>

        <!-- Result Overlay -->
        <div id="overlay" class="hidden">
            <div id="result-message"></div>
            <button id="restart-btn" class="big-button">Hrát znovu!</button>
        </div>
    </div>

    <script src="script.js?v=202604271835"></script>
</body>
</html>
